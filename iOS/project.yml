name: CustodyCalendarLog
options:
  bundleIdPrefix: com.shimondeitel.custodylog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  CustodyCalendarLog:
    type: application
    platform: iOS
    sources:
      - path: CustodyCalendarLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.custodylog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: CustodyCalendarLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CustodyCalendarLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CustodyCalendarLogTests
      - path: CustodyCalendarLog.storekit
    dependencies:
      - target: CustodyCalendarLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.custodylog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CustodyCalendarLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CustodyCalendarLogUITests
    dependencies:
      - target: CustodyCalendarLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.custodylog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  CustodyCalendarLog:
    build:
      targets:
        CustodyCalendarLog: all
        CustodyCalendarLogTests: [test]
        CustodyCalendarLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: CustodyCalendarLog.storekit
    test:
      config: Debug
      storeKitConfiguration: CustodyCalendarLog.storekit
      targets:
        - CustodyCalendarLogTests
        - CustodyCalendarLogUITests
    archive:
      config: Release
